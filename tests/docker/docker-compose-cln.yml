services:
  bitcoin:
    image: blockstream/bitcoind:29.1
    platform: linux/amd64
    command:
      [
        "bitcoind",
        "-printtoconsole",
        "-regtest=1",
        "-rpcallowip=0.0.0.0/0",
        "-rpcbind=0.0.0.0",
        "-rpcuser=user",
        "-rpcpassword=pass",
        "-fallbackfee=0.00001",
        "-rest",
        "-zmqpubrawblock=tcp://0.0.0.0:28332",
        "-zmqpubrawtx=tcp://0.0.0.0:28333"
      ]
    ports:
      - "18443:18443"  # Regtest RPC port
      - "18444:18444"  # Regtest P2P port
      - "28332:28332"  # ZMQ block port
      - "28333:28333"  # ZMQ tx port
    networks:
      - bitcoin-electrs
    healthcheck:
      test: ["CMD", "bitcoin-cli", "-regtest", "-rpcuser=user", "-rpcpassword=pass", "getblockchaininfo"]
      interval: 5s
      timeout: 10s
      retries: 5

  electrs:
    image: mempool/electrs:v3.2.0
    platform: linux/amd64
    depends_on:
      bitcoin:
        condition: service_healthy
    command:
      [
        "-vvvv",
        "--timestamp",
        "--jsonrpc-import",
        "--cookie=user:pass",
        "--network=regtest",
        "--daemon-rpc-addr=bitcoin:18443",
        "--http-addr=0.0.0.0:3002",
        "--electrum-rpc-addr=0.0.0.0:50001"
      ]
    ports:
      - "3002:3002"
      - "50001:50001"
    networks:
      - bitcoin-electrs

  cln:
    image: elementsproject/lightningd:v25.12.1
    platform: linux/amd64
    depends_on:
      bitcoin:
        condition: service_healthy
    volumes:
      - ${CLN_DATA_DIR:-/tmp/cln-data}:/root/.lightning
    command:
      [
        "--bitcoin-rpcconnect=bitcoin",
        "--bitcoin-rpcport=18443",
        "--bitcoin-rpcuser=user",
        "--bitcoin-rpcpassword=pass",
        "--regtest",
        "--experimental-splicing",
      ]
    ports:
      - "19846:19846"
      - "9937:9937"
    networks:
      - bitcoin-electrs

networks:
  bitcoin-electrs:
    driver: bridge
