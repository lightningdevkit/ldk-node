name: CI Checks - VSS Integration Tests

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:latest
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          path: ldk-node
      - name: Enable caching for electrs
        id: cache-electrs
        uses: actions/cache@v5
        with:
          path: bin/electrs-${{ runner.os }}-${{ runner.arch }}
          key: electrs-submit-package-${{ runner.os }}-${{ runner.arch }}
      - name: Download electrs
        if: "steps.cache-electrs.outputs.cache-hit != 'true'"
        run: |
          source ./ldk-node/scripts/build_electrs.sh
          mkdir -p bin
          mv "$ELECTRS_EXE" bin/electrs-${{ runner.os }}-${{ runner.arch }}
      - name: Set electrs environment variable
        run: |
          echo "ELECTRS_EXE=$( pwd )/bin/electrs-${{ runner.os }}-${{ runner.arch }}" >> "$GITHUB_ENV"
      - name: Checkout VSS
        uses: actions/checkout@v6
        with:
          repository: lightningdevkit/vss-server
          path: vss-server

      - name: Build and Deploy VSS Server
        run: |
          cd vss-server
          cargo run server/vss-server-config.toml&
      - name: Run VSS Integration tests
        run: |
          cd ldk-node
          export TEST_VSS_BASE_URL="http://localhost:8080/vss"
          RUSTFLAGS="--cfg vss_test" cargo test io::vss_store
          RUSTFLAGS="--cfg vss_test --cfg cycle_tests" cargo test --test integration_tests_vss
